name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Pre-publish checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-features --locked

      - name: Package workspace
        run: cargo package --workspace --locked

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Publish workspace packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          version="$(cargo pkgid -p gamlss | sed 's/.*#//')"

          crate_exists() {
            local crate_name="$1"

            cargo search "$crate_name" --limit 20 --color never \
              | grep -Eq "^${crate_name} = \"${version}\""
          }

          wait_for_crate() {
            local crate_name="$1"

            for attempt in {1..30}; do
              if crate_exists "$crate_name"; then
                return 0
              fi

              echo "Waiting for ${crate_name} ${version} to appear in crates.io index (${attempt}/30)"
              sleep 10
            done

            echo "Timed out waiting for ${crate_name} ${version} in crates.io index" >&2
            return 1
          }

          publish_package() {
            local package="$1"

            if crate_exists "$package"; then
              echo "${package} ${version} is already published; skipping"
              return 0
            fi

            if ! publish_output="$(cargo publish -p "$package" --locked 2>&1)"; then
              printf '%s\n' "$publish_output"

              if grep -q "already exists on crates.io index" <<< "$publish_output"; then
                echo "${package} ${version} was published by an earlier run; skipping"
                return 0
              fi

              return 1
            fi

            printf '%s\n' "$publish_output"
            wait_for_crate "$package"
          }

          publish_package gamlss-core
          publish_package gamlss-family
          publish_package gamlss-spline
          publish_package gamlss-formula
          publish_package gamlss
